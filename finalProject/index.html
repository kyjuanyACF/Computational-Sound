<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tittle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav id="project-nav">
    <div class="nav-container">
      <a href="index.html" class="nav-link active">Project</a>
      <a href="" class="nav-link">Presentation</a>
      <a href="./writeup/writeup.html" class="nav-link">Writeup</a>
    </div>
  </nav>

  <h1 class="app-title">Tittle</h1>

  <div id="tab-bar">
    <button class="tab-btn active" data-tab="draw">Draw</button>
    <button class="tab-btn" data-tab="listen">Listen</button>
  </div>

  <!-- ── Draw tab ─────────────────────────────────────────────────────────── -->
  <div id="tab-draw" class="tab-panel active">
    <div id="layout">

      <div id="left-col">
        <!-- Pixel art grid canvas + transparent grid overlay -->
        <div id="canvas-wrap">
          <canvas id="drawCanvas"></canvas>
          <canvas id="gridOverlay"></canvas>
        </div>
        <div id="action-row">
          <button id="uploadBtn">Upload Image</button>
          <button id="clearBtn">Clear</button>
          <input type="file" id="fileInput" accept="image/*" hidden>
        </div>
      </div>

      <div id="center-col">
        <p class="section-label">Brush size:</p>
        <div id="size-btns">
          <button class="size-btn active" data-size="1">1×1</button>
          <button class="size-btn" data-size="2">2×2</button>
          <button class="size-btn" data-size="3">3×3</button>
          <button class="size-btn" data-size="5">5×5</button>
        </div>

        <div class="ctrl-group">
          <label>Color:</label>
          <input type="color" id="colorPicker" value="#000000">
        </div>

        <button id="eraseBtn">[ ERASE ]</button>
      </div>

    </div>
  </div>

  <!-- ── Listen tab ────────────────────────────────────────────────────────── -->
  <div id="tab-listen" class="tab-panel">
    <div id="listen-layout">
      <canvas id="asciiCanvas"></canvas>
      <div id="listen-controls">
        <button id="playBtn">&#9654; Play</button>
        <button id="shareBtn">Share</button>
        <div class="ctrl-group">
          <label>Speed:</label>
          <input type="range" id="tempoSlider" min="40" max="350" value="110">
          <span class="ctrl-hint">slow &larr; &rarr; fast</span>
        </div>
      </div>
      <p class="listen-hint">When the scanner hits a char, it changes color in rainbow order</p>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
